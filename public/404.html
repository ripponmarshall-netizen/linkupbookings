<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkUpBookings</title>
  <script type="text/javascript">
    // Single-Page App fallback for GitHub Pages.
    // Redirects a deep link (which GitHub serves as 404) to the app root with
    // the original route encoded in the query string, where index.html decodes
    // it back to a clean URL. See https://github.com/rafgraph/spa-github-pages
    // The app is served under /linkupbookings/, so keep one path segment.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
