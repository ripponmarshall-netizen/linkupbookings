<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c4a2d" />
  <meta name="description" content="Mobile-first booking, payments, reminders, and client management for solo service pros." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LinkUp" />
  <link rel="manifest" href="/linkupbookings/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/linkupbookings/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/linkupbookings/icons/icon.svg" />
  <title>LinkUpBookings</title>
  <script type="text/javascript">
    // Decode the route encoded by 404.html (GitHub Pages SPA fallback) back into
    // a clean URL before the app boots, so React Router sees the real path.
    // Runs before the deferred module script below. See public/404.html.
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
